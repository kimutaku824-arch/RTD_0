<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Road to Dragon</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent;
    user-select: none; touch-action: none; }
:root {
  --gold: #f5c842; --soul-col: #50cfff; --bg: #100c1e;
  --panel-sz: 76px; --gap: 5px;
}
html, body {
  width: 100%; height: 100%; background: var(--bg);
  display: flex; justify-content: center; align-items: flex-start;
  overflow: hidden;
  font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
}
#game {
  width: 100%; max-width: 420px; height: 100vh;
  display: flex; flex-direction: column; overflow: hidden;
  position: relative;
}

/* ══ Money bar ══ */
#money-bar {
  flex-shrink: 0; height: 32px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 10px;
  background: rgba(0,0,0,0.65);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  z-index: 10;
}
#money-val {
  font-size: 15px; font-weight: 700; color: var(--gold);
  letter-spacing: 2px; font-family: 'Courier New', monospace;
}
#menu-btn {
  font-size: 11px; color: rgba(255,255,255,0.8);
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 5px; padding: 3px 10px; cursor: pointer;
  transition: background 0.15s;
}
#menu-btn:active { background: rgba(255,255,255,0.25); }

/* ══ Battle area ══ */
#battle-area {
  flex: 1 1 0; min-height: 0; position: relative; overflow: hidden;
  background: linear-gradient(180deg,
    #7ab4d8 0%, #a8cce0 40%, #78b060 55%, #4a7838 100%);
}

/* Party left */
#party {
  position: absolute; left: 6px; bottom: 8px;
  width: 170px; height: 160px;
}
.char-wrap { position: absolute; }
#cw-0 { right: 0px;   bottom: 0px;   z-index: 4; }
#cw-1 { right: 4px;   bottom: 62px;  z-index: 3; }
#cw-2 { right: 62px;  bottom: 50px;  z-index: 2; }
#cw-3 { right: 34px;  bottom: 108px; z-index: 1; }
.char-img {
  width: 82px; height: 82px; object-fit: contain;
  filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.8));
  mix-blend-mode: screen; display: block;
}
.char-fb {
  width: 82px; height: 82px;
  display: flex; align-items: center; justify-content: center; font-size: 38px;
  filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.8));
}
.char-wrap.atk .char-img, .char-wrap.atk .char-fb {
  animation: atkAnim 0.38s ease;
}
@keyframes atkAnim {
  0%{transform:translateX(0)} 40%{transform:translateX(32px)} 100%{transform:translateX(0)}
}

/* Enemy right */
#enemy-zone {
  position: absolute; right: 8px; top: 50%;
  transform: translateY(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
#enemy-img {
  width: 120px; height: 120px; object-fit: contain;
  filter: drop-shadow(0 4px 14px rgba(0,0,0,0.7));
  transition: filter 0.08s;
}
#enemy-img.hit { filter: brightness(5) saturate(0); }
#enemy-fb { font-size: 80px; line-height:1;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.7)); display:none; }

/* ★ ターン数：敵画像の下・HPゲージの上 */
#eturn-label {
  background: rgba(20,10,40,0.85);
  border: 1px solid rgba(255,200,60,0.7);
  border-radius: 5px; padding: 2px 10px;
  font-size: 12px; font-weight: 700; color: #ffe060;
  white-space: nowrap;
}
#enemy-hpbar {
  width: 110px; height: 8px;
  background: rgba(0,0,0,0.4); border-radius: 4px; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.15);
}
#enemy-hpfill {
  height: 100%;
  background: linear-gradient(90deg, #e03030, #ff5050);
  border-radius: 4px; transition: width 0.35s;
}

/* Damage popup */
#dmg-popup {
  position: absolute; right: 28px; top: 18%;
  font-size: 26px; font-weight: 900; color: #ffe040;
  text-shadow: 0 0 10px #f80, 0 2px 0 #000;
  pointer-events: none; opacity: 0; z-index: 20;
}
#dmg-popup.show { animation: popDmg 0.9s ease forwards; }
@keyframes popDmg {
  0%{opacity:1;transform:translateY(0) scale(1)}
  60%{opacity:1;transform:translateY(-32px) scale(1.2)}
  100%{opacity:0;transform:translateY(-56px) scale(0.9)}
}

/* ══ Status bar ══ */
#status-bar {
  flex-shrink: 0;
  background: rgba(8,6,22,0.97);
  border-top: 2px solid rgba(80,60,160,0.7);
  border-bottom: 2px solid rgba(80,60,160,0.4);
  padding: 5px 10px;
  display: flex; flex-direction: column; gap: 4px;
}
#status-top { display:flex; align-items:center; gap:8px; }
#soul-block { display:flex; flex-direction:column; align-items:center; min-width:56px; }
#soul-label { font-size:9px; color:var(--soul-col); letter-spacing:2px; font-weight:700; }
#soul-val {
  font-size:34px; font-weight:900; color:var(--soul-col); line-height:1;
  text-shadow:0 0 14px rgba(80,200,255,0.8);
  font-family:'Courier New',monospace;
}
#unit-icons { display:flex; gap:5px; flex:1; justify-content:center; }
.unit-icon {
  width:46px; height:46px; border-radius:8px;
  border:2px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.06);
  overflow:hidden; position:relative;
  display:flex; align-items:center; justify-content:center;
}
.unit-icon img { width:100%; height:100%; object-fit:cover; mix-blend-mode:screen; }
.unit-icon .wpn-dot {
  position:absolute; bottom:2px; right:2px;
  width:10px; height:10px;
  border-radius:50%; border:1px solid rgba(0,0,0,0.5);
}
#life-block { display:flex; flex-direction:column; gap:2px; }
#life-top { display:flex; justify-content:space-between; align-items:center; }
#life-label-txt { font-size:9px; color:#aaa; letter-spacing:1px; font-weight:700; }
#life-text { font-size:11px; color:#cfc; font-weight:700; font-family:'Courier New',monospace; }
#life-bar {
  width:100%; height:9px;
  background:rgba(0,0,0,0.4); border-radius:5px;
  overflow:hidden; border:1px solid rgba(255,255,255,0.1);
}
#life-fill { height:100%; border-radius:5px; transition:width 0.4s;
  background:linear-gradient(90deg,#22cc66,#66ff99); }

/* ══ Panel area ══ */
#panel-section {
  flex-shrink:0; padding:8px 8px 10px;
  background:rgba(6,4,18,0.98);
  border-top:2px solid rgba(100,80,200,0.3);
  overflow:hidden;
}
#panel-grid {
  display:grid;
  grid-template-columns:repeat(4,var(--panel-sz));
  grid-template-rows:repeat(2,var(--panel-sz));
  gap:var(--gap); justify-content:center; overflow:hidden;
}
.panel {
  width:var(--panel-sz); height:var(--panel-sz);
  border-radius:10px; overflow:hidden; position:relative; cursor:pointer;
  border:2px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.05);
  transition:transform 0.08s;
}
.panel img { width:100%; height:100%; object-fit:cover; display:block; pointer-events:none; }
.panel.selected {
  border-color:rgba(255,240,60,0.9);
  box-shadow:0 0 12px rgba(255,220,0,0.6),inset 0 0 8px rgba(255,220,0,0.2);
  transform:scale(1.06);
}
.panel .chain-num {
  position:absolute; top:3px; left:5px;
  font-size:13px; font-weight:900; color:#fff;
  text-shadow:0 0 6px #000,1px 1px 0 #000; pointer-events:none;
}
.panel.flash { animation:pFlash 0.22s ease; }
@keyframes pFlash { 0%,100%{filter:brightness(1)} 50%{filter:brightness(2.8)} }
.panel.slide-in { animation:slideIn 0.35s cubic-bezier(0.22,1,0.36,1) forwards; }
@keyframes slideIn {
  from{transform:translateX(-120px);opacity:0} to{transform:translateX(0);opacity:1}
}
#chain-info {
  text-align:center; margin-top:5px;
  font-size:11px; color:rgba(255,255,255,0.45); min-height:16px;
}
#soul-cost-disp { color:var(--soul-col); font-weight:700; margin-left:6px; }
#btn-attack {
  display:block; margin:6px auto 0;
  width:calc(var(--panel-sz)*4 + var(--gap)*3);
  padding:10px 0;
  background:linear-gradient(135deg,#5020a0,#9050f0);
  border:none; border-radius:10px;
  color:#fff; font-size:15px; font-weight:800; letter-spacing:2px; cursor:pointer;
  box-shadow:0 4px 16px rgba(120,50,255,0.5); transition:transform 0.1s;
}
#btn-attack:active { transform:scale(0.97); }
#btn-attack:disabled { opacity:0.35; cursor:not-allowed; }
#msg {
  text-align:center; margin-top:4px;
  font-size:11px; color:rgba(255,220,80,0.9); font-weight:700; min-height:15px;
}

/* ══ MENU overlay ══ */
#menu-overlay {
  display:none; position:absolute; inset:0; z-index:100;
  background:rgba(5,3,18,0.96);
  flex-direction:column;
  overflow-y:auto;
}
#menu-overlay.open { display:flex; }
#menu-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px 10px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
#menu-header h2 { font-size:16px; font-weight:800; color:#fff; letter-spacing:2px; }
#menu-close {
  font-size:20px; color:rgba(255,255,255,0.5); cursor:pointer;
  background:none; border:none; line-height:1; padding:4px;
}
#menu-body { padding:14px 16px; display:flex; flex-direction:column; gap:20px; }

/* Menu sections */
.menu-section { display:flex; flex-direction:column; gap:10px; }
.menu-section-title {
  font-size:11px; font-weight:800; color:var(--soul-col);
  letter-spacing:2px; text-transform:uppercase;
  border-bottom:1px solid rgba(80,200,255,0.2); padding-bottom:4px;
}

/* Retry button */
#btn-retry {
  padding:12px; background:linear-gradient(135deg,#c03030,#f05050);
  border:none; border-radius:10px; color:#fff;
  font-size:14px; font-weight:800; letter-spacing:2px; cursor:pointer;
  box-shadow:0 4px 14px rgba(200,50,50,0.5); transition:transform 0.1s;
}
#btn-retry:active { transform:scale(0.97); }

/* Param sliders */
.param-row {
  display:flex; flex-direction:column; gap:5px;
}
.param-label-row {
  display:flex; justify-content:space-between; align-items:center;
}
.param-name { font-size:12px; color:rgba(255,255,255,0.75); font-weight:600; }
.param-value {
  font-size:13px; font-weight:800; color:var(--gold);
  font-family:'Courier New',monospace; min-width:60px; text-align:right;
}
.param-slider {
  -webkit-appearance:none; appearance:none;
  width:100%; height:6px;
  background:rgba(255,255,255,0.12);
  border-radius:3px; outline:none; cursor:pointer;
  touch-action:manipulation;
}
.param-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:20px; height:20px;
  border-radius:50%; background:var(--gold);
  box-shadow:0 0 6px rgba(245,200,66,0.7); cursor:pointer;
}
.param-slider::-moz-range-thumb {
  width:20px; height:20px; border-radius:50%;
  background:var(--gold); border:none; cursor:pointer;
}

/* Turn mode toggle */
.toggle-row { display:flex; gap:8px; }
.toggle-btn {
  flex:1; padding:8px; border-radius:8px; border:2px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.5);
  font-size:12px; font-weight:700; cursor:pointer; transition:all 0.15s;
}
.toggle-btn.active {
  background:rgba(80,200,255,0.15); border-color:var(--soul-col);
  color:var(--soul-col);
}
.turn-fixed-row {
  display:flex; align-items:center; gap:8px;
  font-size:12px; color:rgba(255,255,255,0.6);
}
.turn-fixed-row input[type=number] {
  width:60px; padding:4px 8px; border-radius:6px;
  background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
  color:#fff; font-size:13px; font-weight:700; text-align:center;
  touch-action:manipulation;
}

/* Apply button */
#btn-apply {
  padding:11px; background:linear-gradient(135deg,#205090,#4080e0);
  border:none; border-radius:10px; color:#fff;
  font-size:13px; font-weight:800; letter-spacing:1px; cursor:pointer;
  box-shadow:0 4px 14px rgba(50,100,220,0.4); transition:transform 0.1s;
}
#btn-apply:active { transform:scale(0.97); }
</style>
</head>
<body>
<div id="game">

  <!-- Money bar -->
  <div id="money-bar">
    <span id="money-val">💰 000000</span>
    <button id="menu-btn">MENU</button>
  </div>

  <!-- Battle area -->
  <div id="battle-area">
    <div id="party"></div>

    <div id="enemy-zone">
      <img id="enemy-img" src="" alt="enemy">
      <div id="enemy-fb">🐉</div>
      <!-- ★ ターン：敵画像の下・HPゲージの上 -->
      <div id="eturn-label">あと <span id="tcnt">4</span> ターン</div>
      <div id="enemy-hpbar"><div id="enemy-hpfill" style="width:100%"></div></div>
    </div>

    <div id="dmg-popup"></div>
  </div>

  <!-- Status bar -->
  <div id="status-bar">
    <div id="status-top">
      <div id="soul-block">
        <div id="soul-label">Soul</div>
        <div id="soul-val">10</div>
      </div>
      <div id="unit-icons"></div>
    </div>
    <div id="life-block">
      <div id="life-top">
        <span id="life-label-txt">LIFE</span>
        <span id="life-text">5000 / 5000</span>
      </div>
      <div id="life-bar"><div id="life-fill" style="width:100%"></div></div>
    </div>
  </div>

  <!-- Panels -->
  <div id="panel-section">
    <div id="panel-grid"></div>
    <div id="chain-info">パネルをスワイプして繋げよう</div>
    <button id="btn-attack" disabled>⚔ 攻撃！</button>
    <div id="msg"></div>
  </div>

  <!-- MENU overlay -->
  <div id="menu-overlay">
    <div id="menu-header">
      <h2>⚙ MENU</h2>
      <button id="menu-close">✕</button>
    </div>
    <div id="menu-body">

      <!-- リトライ -->
      <div class="menu-section">
        <div class="menu-section-title">Game</div>
        <button id="btn-retry">🔄 リトライ</button>
      </div>

      <!-- 敵パラメータ -->
      <div class="menu-section">
        <div class="menu-section-title">Enemy Parameters</div>

        <div class="param-row">
          <div class="param-label-row">
            <span class="param-name">体力 (HP)</span>
            <span class="param-value" id="lbl-ehp">2000</span>
          </div>
          <input class="param-slider" type="range" id="sl-ehp" min="500" max="50000" step="500" value="2000">
        </div>

        <div class="param-row">
          <div class="param-label-row">
            <span class="param-name">防御力 (DEF)</span>
            <span class="param-value" id="lbl-edef">50</span>
          </div>
          <input class="param-slider" type="range" id="sl-edef" min="0" max="500" step="10" value="50">
        </div>

        <div class="param-row">
          <div class="param-label-row">
            <span class="param-name">攻撃力 (ATK)</span>
            <span class="param-value" id="lbl-eatk">350</span>
          </div>
          <input class="param-slider" type="range" id="sl-eatk" min="50" max="2000" step="50" value="350">
        </div>

        <!-- ターン数モード -->
        <div class="param-row">
          <div class="param-label-row">
            <span class="param-name">行動ターン数</span>
          </div>
          <div class="toggle-row">
            <button class="toggle-btn active" id="toggle-rand">ランダム</button>
            <button class="toggle-btn" id="toggle-fixed">固定値</button>
          </div>
          <div class="turn-fixed-row" id="fixed-turn-row" style="display:none">
            固定ターン数:
            <input type="number" id="inp-turn" min="1" max="20" value="4">
          </div>
          <div class="param-row" id="rand-turn-row">
            <div class="param-label-row">
              <span class="param-name">　最小</span>
              <span class="param-value" id="lbl-tmin">3</span>
            </div>
            <input class="param-slider" type="range" id="sl-tmin" min="1" max="10" step="1" value="3">
            <div class="param-label-row">
              <span class="param-name">　最大</span>
              <span class="param-value" id="lbl-tmax">6</span>
            </div>
            <input class="param-slider" type="range" id="sl-tmax" min="1" max="15" step="1" value="6">
          </div>
        </div>

        <button id="btn-apply">✔ 適用してリトライ</button>
      </div>

    </div>
  </div><!-- /menu-overlay -->

</div><!-- /game -->

<script>
// ════════════════════════════════════════════════
//  定数・ユニット定義
// ════════════════════════════════════════════════
const PANEL_TYPES = ['sword','spear','arrow','rod','heart'];
const PANEL_IMG   = {
  sword:'panel/sword.png', spear:'panel/spear.png',
  arrow:'panel/arrow.png', rod:'panel/rod.png', heart:'panel/heart.png'
};
const PANEL_EMOJI = { sword:'⚔️', spear:'🗡️', arrow:'🏹', rod:'🪄', heart:'💚' };
const WPN_COLOR   = {
  sword:'#e04040', spear:'#e08020', arrow:'#20a0e0', rod:'#a040e0', heart:'#e04080'
};

// ユニット定義（atk: 基本攻撃力, critRate: クリティカル率）
// 槍 > 剣 > 弓 > 杖  の順に攻撃力
const UNITS = [
  { id:'sword1', weapon:'sword', atk:420, critRate:0.15, img:'unit/sword1.png', emoji:'⚔️' },
  { id:'spear1', weapon:'spear', atk:520, critRate:0.10, img:'unit/spear1.png', emoji:'🗡️' },
  { id:'spear2', weapon:'spear', atk:500, critRate:0.10, img:'unit/spear2.png', emoji:'🗡️' },
  { id:'rod1',   weapon:'rod',   atk:340, critRate:0.12, img:'unit/rod1.png',   emoji:'🪄' },
];
// 弓は atk:380 だが現パーティーに弓ユニットなし（参考値）

const PARTY_WEAPONS = new Set(UNITS.map(u => u.weapon));
const ENEMY_COUNT   = 1;

// ════════════════════════════════════════════════
//  Enemy parameter (menu で変更可)
// ════════════════════════════════════════════════
let enemyCfg = {
  maxHp:   2000,
  def:     50,
  atk:     350,
  turnMode:'random',   // 'random' | 'fixed'
  turnFixed: 4,
  turnMin:   3,
  turnMax:   6,
};

// ════════════════════════════════════════════════
//  ゲーム状態
// ════════════════════════════════════════════════
let panels=[], chain=[], isDragging=false, attacking=false;
let soul=10, MAX_SOUL=20;
let life=5000, MAX_LIFE=5000;
let enemyHp, enemyTurn;

// ════════════════════════════════════════════════
//  ダメージ計算
//  damage = ((atk × panelRate + flatBonus - enemyDef × defRate)
//            × elementRate × critMult × chainRate × randomRate)
// ════════════════════════════════════════════════
function calcDamage(weapon, panelCount, chainBonus) {
  // パーティーにその武器種がいない → 0
  const attackers = UNITS.filter(u => u.weapon === weapon);
  if (!attackers.length) return 0;

  let totalDmg = 0;
  attackers.forEach(u => {
    // panelRate: 連結数に応じて増加（1パネル=1.0, 以降0.1ずつ加算）
    const panelRate = 1.0 + (panelCount - 1) * 0.1;

    // flatBonus: 今回はsoul消費ごとに小加算（将来拡張用に0固定）
    const flatBonus = 0;

    // 防御減算（最低0）
    const defRate = 0.5;
    const defReduction = Math.max(0, enemyCfg.def * defRate);

    // 属性補正（今回は1.0固定・将来拡張枠）
    const elementRate = 1.0;

    // クリティカル（確率判定）
    const isCrit = Math.random() < u.critRate;
    const critMult = isCrit ? 1.5 : 1.0;

    // スキル倍率（固定1.0・将来拡張）
    const skillRate = 1.0;

    // chainRate: 同じ武器種パネルを連続で繋げたときのコンボ倍率
    // chainBonus = 連続同一武器パネル数（呼び出し元で計算）
    const chainRate = 1.0 + chainBonus * 0.15;

    // 乱数ゆらぎ 0.95〜1.05
    const randomRate = 0.95 + Math.random() * 0.1;

    const base = u.atk * panelRate + flatBonus - defReduction;
    const dmg  = Math.max(1,
      base * elementRate * critMult * skillRate * chainRate * randomRate
    );

    totalDmg += dmg;
  });
  return Math.round(totalDmg);
}

// ════════════════════════════════════════════════
//  チェーンの解析
//  各武器種ごとの「パネル数」と「最大連続コンボ数」を返す
// ════════════════════════════════════════════════
function analyzeChain(ch) {
  // 武器種ごとのパネル数
  const wcount = {};
  ch.forEach(i => {
    const t = panels[i].type;
    wcount[t] = (wcount[t] || 0) + 1;
  });

  // 連続同種コンボの最大長（chainBonus）を武器種ごとに算出
  // 例: sword,sword,spear,sword → swordの最大連続=2
  const chainBonusMap = {};
  PANEL_TYPES.forEach(t => { chainBonusMap[t] = 0; });
  let run = 1;
  const types = ch.map(i => panels[i].type);
  for (let i = 1; i < types.length; i++) {
    if (types[i] === types[i-1]) {
      run++;
    } else {
      run = 1;
    }
    const t = types[i];
    if (run > chainBonusMap[t]) chainBonusMap[t] = run;
  }
  // 初期値（長さ1の連続）
  types.forEach(t => {
    if (chainBonusMap[t] === 0) chainBonusMap[t] = 1;
  });

  return { wcount, chainBonusMap };
}

// ════════════════════════════════════════════════
//  Soul コスト
// ════════════════════════════════════════════════
function calcCost(ch) {
  if (!ch.length) return 0;
  let cost = 0, prev = panels[ch[0]].type;
  for (let i = 1; i < ch.length; i++) {
    if (panels[ch[i]].type !== prev) { cost++; prev = panels[ch[i]].type; }
  }
  return cost;
}

// ════════════════════════════════════════════════
//  敵ターン数を設定から決定
// ════════════════════════════════════════════════
function rollEnemyTurn() {
  if (enemyCfg.turnMode === 'fixed') return enemyCfg.turnFixed;
  const min = Math.min(enemyCfg.turnMin, enemyCfg.turnMax);
  const max = Math.max(enemyCfg.turnMin, enemyCfg.turnMax);
  return min + Math.floor(Math.random() * (max - min + 1));
}

// ════════════════════════════════════════════════
//  初期化
// ════════════════════════════════════════════════
function init() {
  enemyHp   = enemyCfg.maxHp;
  enemyTurn = rollEnemyTurn();
  soul = 10; life = 5000;
  chain = []; attacking = false;

  loadEnemy(); buildParty(); buildIcons();
  initPanels(); updateSoul(); updateLife(); updateEnemyHp();
  document.getElementById('tcnt').textContent = enemyTurn;
  document.getElementById('msg').textContent = '';
  document.getElementById('btn-attack').disabled = true;
  // enemy img hit class reset
  document.getElementById('enemy-img').classList.remove('hit');
}

// ════════════════════════════════════════════════
//  Enemy image
// ════════════════════════════════════════════════
function loadEnemy() {
  const n = Math.floor(Math.random() * ENEMY_COUNT) + 1;
  const img = document.getElementById('enemy-img');
  img.src = `enemy/enemy${n}.png`;
  img.style.display = 'block';
  document.getElementById('enemy-fb').style.display = 'none';
  img.onload  = () => { document.getElementById('enemy-fb').style.display = 'none'; };
  img.onerror = () => {
    img.style.display = 'none';
    document.getElementById('enemy-fb').style.display = 'block';
  };
}

// ════════════════════════════════════════════════
//  Party
// ════════════════════════════════════════════════
function buildParty() {
  const party = document.getElementById('party');
  party.innerHTML = '';
  UNITS.forEach((u, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'char-wrap'; wrap.id = `cw-${i}`;
    const img = document.createElement('img');
    img.className = 'char-img'; img.src = u.img; img.alt = u.id;
    img.onerror = () => {
      img.style.display = 'none';
      const fb = document.createElement('div');
      fb.className = 'char-fb'; fb.textContent = u.emoji;
      wrap.appendChild(fb);
    };
    wrap.appendChild(img);
    party.appendChild(wrap);
  });
}

function buildIcons() {
  const el = document.getElementById('unit-icons');
  el.innerHTML = '';
  UNITS.forEach(u => {
    const div = document.createElement('div');
    div.className = 'unit-icon';
    const img = document.createElement('img');
    img.src = u.img; img.alt = u.id;
    img.onerror = () => {
      img.style.display = 'none';
      const fb = document.createElement('span');
      fb.textContent = u.emoji; fb.style.fontSize = '22px';
      div.appendChild(fb);
    };
    div.appendChild(img);
    const dot = document.createElement('div');
    dot.className = 'wpn-dot'; dot.style.background = WPN_COLOR[u.weapon] || '#888';
    div.appendChild(dot);
    el.appendChild(div);
  });
}

// ════════════════════════════════════════════════
//  Panels
// ════════════════════════════════════════════════
function randType() { return PANEL_TYPES[Math.floor(Math.random() * PANEL_TYPES.length)]; }

function setPanelContent(el, type) {
  el.innerHTML = '';
  el.style.background = '';
  const img = document.createElement('img');
  img.src = PANEL_IMG[type]; img.alt = type; img.draggable = false;
  img.onerror = () => {
    el.style.background = WPN_COLOR[type] || '#444';
    el.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;">${PANEL_EMOJI[type]}</div>`;
  };
  el.appendChild(img);
}

function initPanels() {
  panels = [];
  const grid = document.getElementById('panel-grid');
  grid.innerHTML = '';
  for (let i = 0; i < 8; i++) {
    const type = randType();
    const el = document.createElement('div');
    el.className = 'panel'; el.dataset.idx = i;
    setPanelContent(el, type);
    grid.appendChild(el);
    panels.push({ type, el });
  }
  setupEvents();
}

function refreshPanels(usedIndices) {
  usedIndices.forEach((i, d) => {
    const type = randType();
    panels[i].type = type;
    setPanelContent(panels[i].el, type);
    panels[i].el.classList.remove('slide-in');
    void panels[i].el.offsetWidth;
    panels[i].el.style.animationDelay = (d * 40) + 'ms';
    panels[i].el.classList.add('slide-in');
    setTimeout(() => {
      panels[i].el.style.animationDelay = '';
      panels[i].el.classList.remove('slide-in');
    }, 400 + d * 40);
  });
}

function renderChain() {
  panels.forEach((p, i) => {
    const ci = chain.indexOf(i);
    p.el.classList.toggle('selected', ci >= 0);
    const old = p.el.querySelector('.chain-num');
    if (old) old.remove();
    if (ci >= 0) {
      const n = document.createElement('div');
      n.className = 'chain-num'; n.textContent = ci + 1;
      p.el.appendChild(n);
    }
  });
  const cost = calcCost(chain);
  const ci = document.getElementById('chain-info');
  if (!chain.length) {
    ci.innerHTML = 'パネルをスワイプして繋げよう';
  } else {
    const icons = chain.map(i => PANEL_EMOJI[panels[i].type]).join('');
    ci.innerHTML = `${icons} ×${chain.length}<span id="soul-cost-disp"> Soul -${cost}</span>`;
  }
  document.getElementById('btn-attack').disabled = chain.length === 0 || attacking;
}

// ════════════════════════════════════════════════
//  Touch / Mouse events
// ════════════════════════════════════════════════
function setupEvents() {
  const grid = document.getElementById('panel-grid');
  function idxAt(x, y) {
    for (const el of document.elementsFromPoint(x, y)) {
      if (el.classList.contains('panel')) return +el.dataset.idx;
      const p = el.closest?.('.panel'); if (p) return +p.dataset.idx;
    }
    return -1;
  }
  function adj(a, b) {
    return Math.abs(Math.floor(a/4)-Math.floor(b/4)) <= 1
        && Math.abs(a%4-b%4) <= 1;
  }
  function add(idx) {
    if (idx < 0 || attacking) return;
    const pos = chain.indexOf(idx);
    if (pos >= 0) {
      if (pos === chain.length - 2) { chain.pop(); renderChain(); }
      return;
    }
    if (!chain.length || adj(chain[chain.length-1], idx)) {
      chain.push(idx);
      panels[idx].el.classList.add('flash');
      setTimeout(() => panels[idx].el.classList.remove('flash'), 220);
      renderChain();
    }
  }
  grid.addEventListener('touchstart', e => {
    isDragging = true; chain = [];
    add(idxAt(e.touches[0].clientX, e.touches[0].clientY));
  }, { passive:true });
  grid.addEventListener('touchmove', e => {
    if (isDragging) add(idxAt(e.touches[0].clientX, e.touches[0].clientY));
  }, { passive:true });
  grid.addEventListener('touchend', () => { isDragging = false; });
  grid.addEventListener('mousedown', e => { isDragging=true; chain=[]; add(idxAt(e.clientX,e.clientY)); });
  grid.addEventListener('mousemove', e => { if (isDragging) add(idxAt(e.clientX,e.clientY)); });
  window.addEventListener('mouseup', () => { isDragging = false; });
}

// ════════════════════════════════════════════════
//  UI updates
// ════════════════════════════════════════════════
function updateSoul() { document.getElementById('soul-val').textContent = soul; }

function updateLife() {
  const pct = Math.max(0, life / MAX_LIFE * 100);
  const f = document.getElementById('life-fill');
  f.style.width = pct + '%';
  f.style.background = pct > 50 ? 'linear-gradient(90deg,#22cc66,#66ff99)'
                     : pct > 25 ? 'linear-gradient(90deg,#cc8822,#ffcc44)'
                                : 'linear-gradient(90deg,#cc2222,#ff6666)';
  document.getElementById('life-text').textContent =
    life.toLocaleString() + ' / ' + MAX_LIFE.toLocaleString();
}

function updateEnemyHp() {
  document.getElementById('enemy-hpfill').style.width =
    Math.max(0, enemyHp / enemyCfg.maxHp * 100) + '%';
}

function showDmg(v) {
  const el = document.getElementById('dmg-popup');
  el.textContent = '-' + v.toLocaleString();
  el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 900);
}

function flashEnemy() {
  const el = document.getElementById('enemy-img');
  el.classList.add('hit');
  setTimeout(() => el.classList.remove('hit'), 120);
}

// ════════════════════════════════════════════════
//  Attack button
// ════════════════════════════════════════════════
document.getElementById('btn-attack').addEventListener('click', () => {
  if (!chain.length || attacking) return;
  const cost = calcCost(chain);
  if (soul < cost) {
    document.getElementById('msg').textContent = 'ソウルが足りない！';
    return;
  }

  attacking = true;
  document.getElementById('btn-attack').disabled = true;

  // チェーン解析
  const { wcount, chainBonusMap } = analyzeChain(chain);

  // ダメージ計算
  let totalDmg = 0, heal = 0;
  const msgs = [];
  Object.entries(wcount).forEach(([type, count]) => {
    if (type === 'heart') {
      heal += count * 150;
    } else {
      const dmg = calcDamage(type, count, chainBonusMap[type]);
      if (dmg > 0) totalDmg += dmg;
      else if (!PARTY_WEAPONS.has(type)) {
        msgs.push(`${PANEL_EMOJI[type]}その武器を持つユニットがいない`);
      }
    }
  });

  soul = Math.max(0, soul - cost); updateSoul();

  // Attacker animation
  const activeWeapons = Object.keys(wcount).filter(t => t !== 'heart' && PARTY_WEAPONS.has(t));
  UNITS.forEach((u, i) => {
    if (activeWeapons.includes(u.weapon)) {
      const w = document.getElementById(`cw-${i}`);
      if (w) {
        w.classList.remove('atk'); void w.offsetWidth;
        w.classList.add('atk');
        setTimeout(() => w.classList.remove('atk'), 400);
      }
    }
  });

  const usedIndices = [...chain]; chain = []; renderChain();

  setTimeout(() => {
    if (totalDmg > 0) {
      enemyHp = Math.max(0, enemyHp - totalDmg);
      updateEnemyHp(); showDmg(totalDmg); flashEnemy();
    }
    if (heal > 0) {
      life = Math.min(MAX_LIFE, life + heal); updateLife();
    }

    refreshPanels(usedIndices);

    // Enemy turn countdown
    enemyTurn--;
    if (enemyTurn <= 0) {
      life = Math.max(0, life - enemyCfg.atk); updateLife();
      enemyTurn = rollEnemyTurn();
      document.getElementById('msg').textContent = `💥 敵の攻撃！ -${enemyCfg.atk.toLocaleString()}`;
    } else {
      const m = [];
      if (totalDmg > 0) m.push(`⚔ ${totalDmg.toLocaleString()} ダメージ！`);
      if (heal > 0) m.push(`💚 ${heal.toLocaleString()} 回復！`);
      m.push(...msgs);
      document.getElementById('msg').textContent = m.join('　');
    }
    document.getElementById('tcnt').textContent = enemyTurn;

    if (enemyHp <= 0) {
      document.getElementById('enemy-img').style.opacity = '0.3';
      document.getElementById('msg').textContent = '🎉 敵を倒した！';
      document.getElementById('btn-attack').disabled = true;
      attacking = false; return;
    }
    if (life <= 0) {
      document.getElementById('msg').textContent = '💀 全滅...';
      document.getElementById('btn-attack').disabled = true;
      attacking = false; return;
    }

    attacking = false; renderChain();
  }, 380);
});

// ════════════════════════════════════════════════
//  MENU
// ════════════════════════════════════════════════
const overlay = document.getElementById('menu-overlay');

document.getElementById('menu-btn').addEventListener('click', () => {
  overlay.classList.add('open');
});
document.getElementById('menu-close').addEventListener('click', () => {
  overlay.classList.remove('open');
});

// Sliders sync
function syncSlider(sliderId, labelId, fmt) {
  const sl = document.getElementById(sliderId);
  const lb = document.getElementById(labelId);
  lb.textContent = fmt ? fmt(+sl.value) : sl.value;
  sl.addEventListener('input', () => {
    lb.textContent = fmt ? fmt(+sl.value) : sl.value;
  });
}
syncSlider('sl-ehp',  'lbl-ehp',  v => v.toLocaleString());
syncSlider('sl-edef', 'lbl-edef', null);
syncSlider('sl-eatk', 'lbl-eatk', null);
syncSlider('sl-tmin', 'lbl-tmin', null);
syncSlider('sl-tmax', 'lbl-tmax', null);

// Turn mode toggle
const btnRand  = document.getElementById('toggle-rand');
const btnFixed = document.getElementById('toggle-fixed');
const randRow  = document.getElementById('rand-turn-row');
const fixedRow = document.getElementById('fixed-turn-row');

btnRand.addEventListener('click', () => {
  btnRand.classList.add('active'); btnFixed.classList.remove('active');
  randRow.style.display = ''; fixedRow.style.display = 'none';
});
btnFixed.addEventListener('click', () => {
  btnFixed.classList.add('active'); btnRand.classList.remove('active');
  fixedRow.style.display = ''; randRow.style.display = 'none';
});

// Retry
document.getElementById('btn-retry').addEventListener('click', () => {
  overlay.classList.remove('open');
  init();
});

// Apply & retry
document.getElementById('btn-apply').addEventListener('click', () => {
  enemyCfg.maxHp    = +document.getElementById('sl-ehp').value;
  enemyCfg.def      = +document.getElementById('sl-edef').value;
  enemyCfg.atk      = +document.getElementById('sl-eatk').value;
  enemyCfg.turnMode = btnFixed.classList.contains('active') ? 'fixed' : 'random';
  enemyCfg.turnFixed= +document.getElementById('inp-turn').value;
  enemyCfg.turnMin  = +document.getElementById('sl-tmin').value;
  enemyCfg.turnMax  = +document.getElementById('sl-tmax').value;
  overlay.classList.remove('open');
  init();
});

// ════════════════════════════════════════════════
//  Start
// ════════════════════════════════════════════════
init();
</script>
